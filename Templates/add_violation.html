{% extends "base.html" %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Log New Traffic Violation</h4>
      </div>
      <div class="card-body">
        <form action="{{ url_for('add_violation') }}" method="POST">
          <div class="mb-3">
            <label class="form-label">Vehicle Number</label>
            <input
              type="text"
              name="vehicle_number"
              class="form-control"
              placeholder="e.g. TN 01 AB 1234"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Violation Type</label>
            <select name="violation_type" class="form-select" required>
              <option value="" selected disabled>Select Type</option>
              <option value="No Helmet">No Helmet</option>
              <option value="Overspeeding">Overspeeding</option>
              <option value="Signal Jump">Signal Jump</option>
              <option value="No Seatbelt">No Seatbelt</option>
              <option value="Drunken Driving">Drunken Driving</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Location</label>
            <input
              type="text"
              name="location"
              class="form-control"
              placeholder="e.g. Anna Salai, Chennai"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Fine Amount (₹)</label>
            <input
              type="number"
              name="fine_amount"
              class="form-control"
              placeholder="Enter amount"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success">
              Generate Digital Challan
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
